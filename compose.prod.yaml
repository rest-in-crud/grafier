services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-grafier}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: prod
    env_file: .env
    environment:
      DATABASE_URI: postgresql://postgres:postgres@postgres:5432/grafier
    command: ["node", "dist/migrate.js"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: prod
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URI: postgresql://postgres:postgres@postgres:5432/grafier
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      target: prod
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - server

volumes:
  postgres_data:
